<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lake OS Empresarial</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Segoe UI,Arial,sans-serif;background:#f6f7f8;color:#1f2937}
    .loading{background:#fff;border:1px solid #e4e8eb;border-radius:14px;padding:28px;box-shadow:0 8px 28px rgba(31,41,55,.10);text-align:center}
    strong{display:block;color:#ed491d;font-size:24px;margin-bottom:8px}
  </style>
</head>
<body>
  <div class="loading"><strong>Lake OS</strong><span>Carregando o sistema empresarial...</span></div>
  <script>
    const parts = Array.from({length:12},(_,i)=>`lake-os/part-${String(i+1).padStart(2,"0")}.txt`);
    Promise.all(parts.map(path=>fetch(path).then(response=>{
      if(!response.ok) throw new Error(`Falha ao carregar ${path}`);
      return response.text();
    }))).then(chunks=>{
      const html=chunks.join("");
      document.open();
      document.write(html);
      document.close();
    }).catch(error=>{
      document.body.innerHTML=`<div class="loading"><strong>Não foi possível abrir o Lake OS</strong><span>${error.message}</span></div>`;
      console.error(error);
    });
  </script>
</body>
</html>
